<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Administrador - StreamSafe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .header h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .form-group label .required {
            color: #f87171;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: #6c63ff;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1);
        }

        .form-group input.error {
            border-color: #f87171;
        }

        .form-group .hint {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-top: 4px;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 48px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6c63ff, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn.loading .spinner {
            display: block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        .message.success {
            display: block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .message.error {
            display: block;
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #fca5a5;
        }

        .message .details {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .admin-info {
            margin-top: 20px;
            padding: 16px;
            background: rgba(108, 99, 255, 0.08);
            border: 1px solid rgba(108, 99, 255, 0.15);
            border-radius: 12px;
            display: none;
        }

        .admin-info.show {
            display: block;
        }

        .admin-info .label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-info .value {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            margin-top: 2px;
            word-break: break-all;
        }

        .admin-info .row {
            margin-bottom: 10px;
        }

        .admin-info .row:last-child {
            margin-bottom: 0;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
            }
            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="icon">🛡️</div>
            <h1>Criar <span>Administrador</span></h1>
            <p>Preencha os dados abaixo para criar um novo admin</p>
        </div>

        <!-- Formulário -->
        <form id="adminForm" autocomplete="off">
            <div class="form-group">
                <label>Nome completo <span class="required">*</span></label>
                <input
                    type="text"
                    id="nome"
                    placeholder="Ex: João Silva"
                    required
                    autocomplete="off"
                />
            </div>

            <div class="form-group">
                <label>E-mail <span class="required">*</span></label>
                <input
                    type="email"
                    id="email"
                    placeholder="admin@streamsafe.com"
                    required
                    autocomplete="off"
                />
            </div>

            <div class="form-group">
                <label>Senha <span class="required">*</span></label>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="senha"
                        placeholder="Mínimo 6 caracteres"
                        minlength="6"
                        required
                        autocomplete="new-password"
                    />
                    <button
                        type="button"
                        class="toggle-password"
                        id="togglePassword"
                        aria-label="Mostrar senha"
                    >
                        👁️
                    </button>
                </div>
                <div class="hint">Mínimo 6 caracteres</div>
            </div>

            <div class="form-group">
                <label>Confirmar senha <span class="required">*</span></label>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="confirmarSenha"
                        placeholder="Digite a senha novamente"
                        minlength="6"
                        required
                        autocomplete="new-password"
                    />
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <span class="btn-text">🚀 Criar Administrador</span>
                <div class="spinner"></div>
            </button>
        </form>

        <!-- Mensagens -->
        <div id="message" class="message"></div>

        <!-- Dados do Admin Criado -->
        <div id="adminInfo" class="admin-info">
            <div class="row">
                <div class="label">🆔 ID</div>
                <div class="value" id="infoId">-</div>
            </div>
            <div class="row">
                <div class="label">👤 Nome</div>
                <div class="value" id="infoNome">-</div>
            </div>
            <div class="row">
                <div class="label">📧 E-mail</div>
                <div class="value" id="infoEmail">-</div>
            </div>
            <div class="row">
                <div class="label">🔑 Senha</div>
                <div class="value" id="infoSenha">********</div>
            </div>
        </div>

        <div class="footer">
            <a href="#" onclick="location.reload()">↻ Criar outro admin</a>
        </div>
    </div>

    <script>
        (function() {
            // ============ CONFIGURAÇÃO ============
            const API_URL = 'https://streamsafe-api-n5zq.onrender.com';

            // ============ ELEMENTOS ============
            const form = document.getElementById('adminForm');
            const nomeInput = document.getElementById('nome');
            const emailInput = document.getElementById('email');
            const senhaInput = document.getElementById('senha');
            const confirmarInput = document.getElementById('confirmarSenha');
            const submitBtn = document.getElementById('submitBtn');
            const messageEl = document.getElementById('message');
            const adminInfo = document.getElementById('adminInfo');
            const toggleBtn = document.getElementById('togglePassword');

            // ============ FUNÇÃO HASH (igual ao backend) ============
            function hashPassword(password) {
                let hash = 0;
                for (let i = 0; i < password.length; i++) {
                    hash = ((hash << 5) - hash) + password.charCodeAt(i);
                    hash = hash & hash;
                }
                return hash.toString();
            }

            // ============ MOSTRAR/OCULTAR SENHA ============
            let passwordVisible = false;
            toggleBtn.addEventListener('click', function() {
                passwordVisible = !passwordVisible;
                senhaInput.type = passwordVisible ? 'text' : 'password';
                toggleBtn.textContent = passwordVisible ? '🙈' : '👁️';
            });

            // ============ VALIDAR ============
            function validateForm() {
                const nome = nomeInput.value.trim();
                const email = emailInput.value.trim();
                const senha = senhaInput.value;
                const confirmar = confirmarInput.value;

                // Remover erros anteriores
                document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));

                if (nome.length < 3) {
                    nomeInput.classList.add('error');
                    showMessage('Nome deve ter pelo menos 3 caracteres.', 'error');
                    return false;
                }

                if (!email || !email.includes('@') || !email.includes('.')) {
                    emailInput.classList.add('error');
                    showMessage('E-mail inválido. Use um formato como admin@streamsafe.com', 'error');
                    return false;
                }

                if (senha.length < 6) {
                    senhaInput.classList.add('error');
                    showMessage('Senha deve ter pelo menos 6 caracteres.', 'error');
                    return false;
                }

                if (senha !== confirmar) {
                    confirmarInput.classList.add('error');
                    showMessage('As senhas não coincidem!', 'error');
                    return false;
                }

                return true;
            }

            // ============ MENSAGENS ============
            function showMessage(text, type = 'success', details = '') {
                messageEl.className = `message ${type}`;
                messageEl.innerHTML = `
                    ${text}
                    ${details ? `<div class="details">${details}</div>` : ''}
                `;
                messageEl.style.display = 'block';
            }

            function hideMessage() {
                messageEl.style.display = 'none';
                adminInfo.classList.remove('show');
            }

            function showAdminInfo(data) {
                document.getElementById('infoId').textContent = data.id || '-';
                document.getElementById('infoNome').textContent = data.nome || '-';
                document.getElementById('infoEmail').textContent = data.email || '-';
                document.getElementById('infoSenha').textContent = '********';
                adminInfo.classList.add('show');
            }

            // ============ ENVIAR FORMULÁRIO ============
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideMessage();

                if (!validateForm()) {
                    return;
                }

                // Ativar loading
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;

                const nome = nomeInput.value.trim();
                const email = emailInput.value.trim();
                const senha = senhaInput.value;
                const senhaHash = hashPassword(senha);
                const agora = new Date().toISOString();
                const adminId = 'admin_' + Date.now();

                const payload = {
                    id: adminId,
                    nome: nome,
                    email: email,
                    senha: senhaHash,
                    status: 'aprovado',
                    role: 'admin',
                    plano: 'anual',
                    plano_validade: new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString(),
                    avatar: nome.charAt(0).toUpperCase(),
                    data_cadastro: agora
                };

                try {
                    const response = await fetch(`${API_URL}/api/users`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        showMessage(
                            '✅ Administrador criado com sucesso!',
                            'success',
                            'O admin já pode fazer login.'
                        );
                        showAdminInfo({
                            id: adminId,
                            nome: nome,
                            email: email
                        });
                        form.reset();
                    } else {
                        showMessage(
                            '❌ Erro ao criar admin',
                            'error',
                            result.error || 'Tente novamente mais tarde'
                        );
                    }
                } catch (error) {
                    showMessage(
                        '❌ Erro de conexão',
                        'error',
                        'Verifique se a API está online: ' + error.message
                    );
                } finally {
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            });

            // ============ LIMPAR ERRO AO DIGITAR ============
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', function() {
                    this.classList.remove('error');
                    hideMessage();
                });
            });

            // ============ TESTAR API ============
            async function testApi() {
                try {
                    const response = await fetch(`${API_URL}/api/health`);
                    if (response.ok) {
                        console.log('✅ API online');
                    }
                } catch (error) {
                    showMessage(
                        '⚠️ API não acessível',
                        'error',
                        'Verifique se a API está no ar.'
                    );
                }
            }

            testApi();

        })();
    </script>
</body>
</html>
