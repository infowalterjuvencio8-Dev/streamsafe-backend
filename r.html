<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Administrador - StreamSafe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .header h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .form-group label .required {
            color: #f87171;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: #6c63ff;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1);
        }

        .form-group input.error {
            border-color: #f87171;
        }

        .form-group .hint {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-top: 4px;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 48px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6c63ff, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn.loading .spinner {
            display: block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        .message.success {
            display: block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .message.error {
            display: block;
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #fca5a5;
        }

        .message .details {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .admin-info {
            margin-top: 20px;
            padding: 16px;
            background: rgba(108, 99, 255, 0.08);
            border: 1px solid rgba(108, 99, 255, 0.15);
            border-radius: 12px;
            display: none;
        }

        .admin-info.show {
            display: block;
        }

        .admin-info .label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-info .value {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            margin-top: 2px;
            word-break: break-all;
        }

        .admin-info .row {
            margin-bottom: 10px;
        }

        .admin-info .row:last-child {
            margin-bottom: 0;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .footer a:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
            }
            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🛡️</div>
            <h1>Criar <span>Administrador</span></h1>
            <p>Preencha os dados abaixo para criar um novo admin</p>
        </div>

        <form id="adminForm" autocomplete="off">
            <div class="form-group">
                <label>Nome completo <span class="required">*</span></label>
                <input type="text" id="nome" placeholder="Ex: João Silva" required />
            </div>

            <div class="form-group">
                <label>E-mail <span class="required">*</span></label>
                <input type="email" id="email" placeholder="admin@streamsafe.com" required />
            </div>

            <div class="form-group">
                <label>Senha <span class="required">*</span></label>
                <div class="password-wrapper">
                    <input type="password" id="senha" placeholder="Mínimo 6 caracteres" minlength="6" required />
                    <button type="button" class="toggle-password" id="togglePassword">👁️</button>
                </div>
                <div class="hint">Mínimo 6 caracteres</div>
            </div>

            <div class="form-group">
                <label>Confirmar senha <span class="required">*</span></label>
                <input type="password" id="confirmarSenha" placeholder="Digite a senha novamente" minlength="6" required />
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <span class="btn-text">🚀 Criar Administrador</span>
                <div class="spinner"></div>
            </button>
        </form>

        <div id="message" class="message"></div>

        <div id="adminInfo" class="admin-info">
            <div class="row"><div class="label">🆔 ID</div><div class="value" id="infoId">-</div></div>
            <div class="row"><div class="label">👤 Nome</div><div class="value" id="infoNome">-</div></div>
            <div class="row"><div class="label">📧 E-mail</div><div class="value" id="infoEmail">-</div></div>
            <div class="row"><div class="label">🔑 Senha</div><div class="value" id="infoSenha">********</div></div>
        </div>

        <div class="footer">
            <a href="#" onclick="location.reload(); return false;">↻ Criar outro admin</a>
        </div>
    </div>

    <script>
        // CONFIGURACAO
        var API_URL = 'https://streamsafe-api-n5zq.onrender.com';

        // ELEMENTOS
        var form = document.getElementById('adminForm');
        var nomeInput = document.getElementById('nome');
        var emailInput = document.getElementById('email');
        var senhaInput = document.getElementById('senha');
        var confirmarInput = document.getElementById('confirmarSenha');
        var submitBtn = document.getElementById('submitBtn');
        var messageEl = document.getElementById('message');
        var adminInfo = document.getElementById('adminInfo');
        var toggleBtn = document.getElementById('togglePassword');

        // FUNCAO HASH
        function hashPassword(password) {
            var hash = 0;
            for (var i = 0; i < password.length; i++) {
                hash = ((hash << 5) - hash) + password.charCodeAt(i);
                hash = hash & hash;
            }
            return hash.toString();
        }

        // MOSTRA/OCULTA SENHA
        var passwordVisible = false;
        toggleBtn.onclick = function() {
            passwordVisible = !passwordVisible;
            senhaInput.type = passwordVisible ? 'text' : 'password';
            toggleBtn.textContent = passwordVisible ? '🙈' : '👁️';
        };

        // VALIDAR
        function validateForm() {
            var nome = nomeInput.value.trim();
            var email = emailInput.value.trim();
            var senha = senhaInput.value;
            var confirmar = confirmarInput.value;

            document.querySelectorAll('.error').forEach(function(el) { el.classList.remove('error'); });

            if (nome.length < 3) {
                nomeInput.classList.add('error');
                showMessage('Nome deve ter pelo menos 3 caracteres.', 'error');
                return false;
            }

            if (!email || email.indexOf('@') === -1 || email.indexOf('.') === -1) {
                emailInput.classList.add('error');
                showMessage('E-mail inválido.', 'error');
                return false;
            }

            if (senha.length < 6) {
                senhaInput.classList.add('error');
                showMessage('Senha deve ter pelo menos 6 caracteres.', 'error');
                return false;
            }

            if (senha !== confirmar) {
                confirmarInput.classList.add('error');
                showMessage('As senhas não coincidem!', 'error');
                return false;
            }

            return true;
        }

        // MENSAGENS
        function showMessage(text, type, details) {
            details = details || '';
            messageEl.className = 'message ' + type;
            messageEl.innerHTML = text + (details ? '<div class="details">' + details + '</div>' : '');
            messageEl.style.display = 'block';
        }

        function hideMessage() {
            messageEl.style.display = 'none';
            adminInfo.classList.remove('show');
        }

        function showAdminInfo(data) {
            document.getElementById('infoId').textContent = data.id || '-';
            document.getElementById('infoNome').textContent = data.nome || '-';
            document.getElementById('infoEmail').textContent = data.email || '-';
            document.getElementById('infoSenha').textContent = '********';
            adminInfo.classList.add('show');
        }

        // ENVIAR FORM
        form.onsubmit = function(e) {
            e.preventDefault();
            hideMessage();

            if (!validateForm()) return;

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            var nome = nomeInput.value.trim();
            var email = emailInput.value.trim();
            var senha = senhaInput.value;
            var senhaHash = hashPassword(senha);
            var adminId = 'admin_' + Date.now();
            var agora = new Date().toISOString();

            var payload = {
                id: adminId,
                nome: nome,
                email: email,
                senha: senhaHash,
                status: 'aprovado',
                role: 'admin',
                plano: 'anual',
                plano_validade: new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString(),
                avatar: nome.charAt(0).toUpperCase(),
                data_cadastro: agora
            };

            fetch(API_URL + '/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(function(response) {
                return response.json().then(function(result) {
                    return { status: response.status, data: result };
                });
            })
            .then(function(result) {
                if (result.status === 200 && result.data.success) {
                    showMessage('✅ Administrador criado com sucesso!', 'success', 'O admin já pode fazer login.');
                    showAdminInfo({ id: adminId, nome: nome, email: email });
                    form.reset();
                } else {
                    showMessage('❌ Erro ao criar admin', 'error', result.data.error || 'Tente novamente.');
                }
            })
            .catch(function(error) {
                showMessage('❌ Erro de conexão', 'error', 'Verifique a API: ' + error.message);
            })
            .finally(function() {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            });
        };

        // LIMPAR ERRO AO DIGITAR
        document.querySelectorAll('input').forEach(function(input) {
            input.oninput = function() {
                this.classList.remove('error');
                hideMessage();
            };
        });

        // TESTAR API
        fetch(API_URL + '/api/health')
            .then(function(response) {
                if (response.ok) console.log('✅ API online');
            })
            .catch(function() {
                showMessage('⚠️ API não acessível', 'error', 'Verifique se a API está no ar.');
            });
    </script>
</body>
</html>
